upstream api {
    server api:3000;
}

upstream frontend {
    server frontend:3001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # FastAPI backend: /api/v1/* → api service at /v1/*.
    # All other /api/* paths (BFF routes, /api/auth/*) fall through to frontend.
    location /api/v1/ {
        proxy_pass         http://api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }

    # Next.js frontend: everything else, including /api/auth/* and BFF routes.
    # Large proxy buffers accommodate Auth.js session JWTs in response headers.
    location / {
        proxy_buffer_size        32k;
        proxy_buffers            8 32k;
        proxy_busy_buffers_size  32k;
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
