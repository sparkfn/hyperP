x-ingestion-env: &ingestion-env
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  BATCH_SIZE: ${BATCH_SIZE:-1000}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-1}
  MAX_CONCURRENT_INGESTIONS: ${MAX_CONCURRENT_INGESTIONS:-1}
  FUNDBOX_INGEST_CRON: ${FUNDBOX_INGEST_CRON:-}
  FUNDBOX_DB_HOST: ${FUNDBOX_DB_HOST:-host.docker.internal}
  FUNDBOX_DB_PORT: ${FUNDBOX_DB_PORT:-3306}
  FUNDBOX_DB_USER: ${FUNDBOX_DB_USER:-root}
  FUNDBOX_DB_PASSWORD: ${FUNDBOX_DB_PASSWORD:-}
  FUNDBOX_DB_NAME: ${FUNDBOX_DB_NAME:-fundbox-dev}
  FUNDBOX_CHUNK_SIZE: ${FUNDBOX_CHUNK_SIZE:-1000}

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      PORT: 3000
      LOG_LEVEL: info
    depends_on:
      neo4j:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment: *ingestion-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - src.celery_app
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_WORKER_CONCURRENCY:-1}

  beat:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment: *ingestion-env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/celerybeat:/var/celerybeat
    command:
      - celery
      - -A
      - src.celery_app
      - beat
      - --loglevel=info
      - --schedule=/var/celerybeat/schedule
