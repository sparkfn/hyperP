x-ingestion-env: &ingestion-env
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  BATCH_SIZE: ${BATCH_SIZE:-1000}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-1}
  MAX_CONCURRENT_INGESTIONS: ${MAX_CONCURRENT_INGESTIONS:-1}
  FUNDBOX_CONSUMER_BACKEND_INGEST_CRON: ${FUNDBOX_CONSUMER_BACKEND_INGEST_CRON:-}
  FUNDBOX_CONSUMER_BACKEND_SSH_HOST: ${FUNDBOX_CONSUMER_BACKEND_SSH_HOST:-}
  FUNDBOX_CONSUMER_BACKEND_SSH_PORT: ${FUNDBOX_CONSUMER_BACKEND_SSH_PORT:-}
  FUNDBOX_CONSUMER_BACKEND_SSH_USER: ${FUNDBOX_CONSUMER_BACKEND_SSH_USER:-}
  FUNDBOX_CONSUMER_BACKEND_SSH_PASSWORD: ${FUNDBOX_CONSUMER_BACKEND_SSH_PASSWORD:-}
  FUNDBOX_CONSUMER_BACKEND_DB_HOST: ${FUNDBOX_CONSUMER_BACKEND_DB_HOST:-}
  FUNDBOX_CONSUMER_BACKEND_DB_PORT: ${FUNDBOX_CONSUMER_BACKEND_DB_PORT:-}
  FUNDBOX_CONSUMER_BACKEND_DB_USER: ${FUNDBOX_CONSUMER_BACKEND_DB_USER:-}
  FUNDBOX_CONSUMER_BACKEND_DB_PASSWORD: ${FUNDBOX_CONSUMER_BACKEND_DB_PASSWORD:-}
  FUNDBOX_CONSUMER_BACKEND_DB_NAME: ${FUNDBOX_CONSUMER_BACKEND_DB_NAME:-}
  FUNDBOX_CONSUMER_BACKEND_CHUNK_SIZE: ${FUNDBOX_CONSUMER_BACKEND_CHUNK_SIZE:-}
  SPEEDZONE_PHPPOS_INGEST_CRON: ${SPEEDZONE_PHPPOS_INGEST_CRON:-}
  SPEEDZONE_PHPPOS_SSH_HOST: ${SPEEDZONE_PHPPOS_SSH_HOST:-}
  SPEEDZONE_PHPPOS_SSH_PORT: ${SPEEDZONE_PHPPOS_SSH_PORT:-}
  SPEEDZONE_PHPPOS_SSH_USER: ${SPEEDZONE_PHPPOS_SSH_USER:-}
  SPEEDZONE_PHPPOS_SSH_PASSWORD: ${SPEEDZONE_PHPPOS_SSH_PASSWORD:-}
  SPEEDZONE_PHPPOS_DB_HOST: ${SPEEDZONE_PHPPOS_DB_HOST:-}
  SPEEDZONE_PHPPOS_DB_PORT: ${SPEEDZONE_PHPPOS_DB_PORT:-}
  SPEEDZONE_PHPPOS_DB_USER: ${SPEEDZONE_PHPPOS_DB_USER:-}
  SPEEDZONE_PHPPOS_DB_PASSWORD: ${SPEEDZONE_PHPPOS_DB_PASSWORD:-}
  SPEEDZONE_PHPPOS_DB_NAME: ${SPEEDZONE_PHPPOS_DB_NAME:-}
  SPEEDZONE_PHPPOS_CHUNK_SIZE: ${SPEEDZONE_PHPPOS_CHUNK_SIZE:-}
  EKO_PHPPOS_SSH_HOST: ${EKO_PHPPOS_SSH_HOST:-}
  EKO_PHPPOS_SSH_PORT: ${EKO_PHPPOS_SSH_PORT:-}
  EKO_PHPPOS_SSH_USER: ${EKO_PHPPOS_SSH_USER:-}
  EKO_PHPPOS_SSH_PASSWORD: ${EKO_PHPPOS_SSH_PASSWORD:-}
  EKO_PHPPOS_DB_HOST: ${EKO_PHPPOS_DB_HOST:-}
  EKO_PHPPOS_DB_PORT: ${EKO_PHPPOS_DB_PORT:-}
  EKO_PHPPOS_DB_USER: ${EKO_PHPPOS_DB_USER:-}
  EKO_PHPPOS_DB_PASSWORD: ${EKO_PHPPOS_DB_PASSWORD:-}
  EKO_PHPPOS_DB_NAME: ${EKO_PHPPOS_DB_NAME:-}
  EKO_PHPPOS_CHUNK_SIZE: ${EKO_PHPPOS_CHUNK_SIZE:-}
  EKO_PHPPOS_INGEST_CRON: ${EKO_PHPPOS_INGEST_CRON:-}

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    # Not exposed externally — all ingress goes through the nginx web service.
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      PORT: 3000
      LOG_LEVEL: info
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_HOSTED_DOMAIN: ${AUTH_GOOGLE_HOSTED_DOMAIN:-}
      BOOTSTRAP_ADMIN_EMAILS: ${BOOTSTRAP_ADMIN_EMAILS:-}
      PUBLIC_PAGE_EXPIRY_MINUTES: ${PUBLIC_PAGE_EXPIRY_MINUTES:-30}
      ROOT_PATH: /api
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    # Not exposed externally — all ingress goes through the nginx web service.
    environment:
      # Server-side only — Next.js Route Handlers proxy to FastAPI on the
      # docker network using the service origin.
      API_BASE_URL: ${API_BASE_URL:-http://api:3000}
      NODE_ENV: production
      PORT: 3001
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      # AUTH_TRUST_HOST lets Auth.js accept the forwarded host header from nginx.
      AUTH_TRUST_HOST: "true"
    depends_on:
      - api

  web:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

  worker:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment: *ingestion-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - src.celery_app
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_WORKER_CONCURRENCY:-1}

  beat:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment: *ingestion-env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/celerybeat:/var/celerybeat
    command:
      - celery
      - -A
      - src.celery_app
      - beat
      - --loglevel=info
      - --schedule=/var/celerybeat/schedule
