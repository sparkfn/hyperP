x-ingestion-env: &ingestion-env
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  BATCH_SIZE: ${BATCH_SIZE:-1000}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-1}
  MAX_CONCURRENT_INGESTIONS: ${MAX_CONCURRENT_INGESTIONS:-1}
  FUNDBOX_INGEST_CRON: ${FUNDBOX_INGEST_CRON:-}
  FUNDBOX_SSH_HOST: ${FUNDBOX_SSH_HOST:-}
  FUNDBOX_SSH_PORT: ${FUNDBOX_SSH_PORT:-}
  FUNDBOX_SSH_USER: ${FUNDBOX_SSH_USER:-}
  FUNDBOX_SSH_PASSWORD: ${FUNDBOX_SSH_PASSWORD:-}
  FUNDBOX_DB_HOST: ${FUNDBOX_DB_HOST:-}
  FUNDBOX_DB_PORT: ${FUNDBOX_DB_PORT:-}
  FUNDBOX_DB_USER: ${FUNDBOX_DB_USER:-}
  FUNDBOX_DB_PASSWORD: ${FUNDBOX_DB_PASSWORD:-}
  FUNDBOX_DB_NAME: ${FUNDBOX_DB_NAME:-}
  FUNDBOX_CHUNK_SIZE: ${FUNDBOX_CHUNK_SIZE:-}
  SPEEDZONE_INGEST_CRON: ${SPEEDZONE_INGEST_CRON:-}
  SPEEDZONE_SSH_HOST: ${SPEEDZONE_SSH_HOST:-}
  SPEEDZONE_SSH_PORT: ${SPEEDZONE_SSH_PORT:-}
  SPEEDZONE_SSH_USER: ${SPEEDZONE_SSH_USER:-}
  SPEEDZONE_SSH_PASSWORD: ${SPEEDZONE_SSH_PASSWORD:-}
  SPEEDZONE_DB_HOST: ${SPEEDZONE_DB_HOST:-}
  SPEEDZONE_DB_PORT: ${SPEEDZONE_DB_PORT:-}
  SPEEDZONE_DB_USER: ${SPEEDZONE_DB_USER:-}
  SPEEDZONE_DB_PASSWORD: ${SPEEDZONE_DB_PASSWORD:-}
  SPEEDZONE_DB_NAME: ${SPEEDZONE_DB_NAME:-}
  SPEEDZONE_CHUNK_SIZE: ${SPEEDZONE_CHUNK_SIZE:-}
  EKO_SSH_HOST: ${EKO_SSH_HOST:-}
  EKO_SSH_PORT: ${EKO_SSH_PORT:-}
  EKO_SSH_USER: ${EKO_SSH_USER:-}
  EKO_SSH_PASSWORD: ${EKO_SSH_PASSWORD:-}
  EKO_DB_HOST: ${EKO_DB_HOST:-}
  EKO_DB_PORT: ${EKO_DB_PORT:-}
  EKO_DB_USER: ${EKO_DB_USER:-}
  EKO_DB_PASSWORD: ${EKO_DB_PASSWORD:-}
  EKO_DB_NAME: ${EKO_DB_NAME:-}
  EKO_CHUNK_SIZE: ${EKO_CHUNK_SIZE:-}
  EKO_INGEST_CRON: ${EKO_INGEST_CRON:-}

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      PORT: 3000
      LOG_LEVEL: info
    depends_on:
      neo4j:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      # Server-side only — Next.js Route Handlers proxy to FastAPI on the
      # docker network using the service name.
      API_BASE_URL: ${API_BASE_URL:-http://api:3000/v1}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment: *ingestion-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - src.celery_app
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_WORKER_CONCURRENCY:-1}

  beat:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment: *ingestion-env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/celerybeat:/var/celerybeat
    command:
      - celery
      - -A
      - src.celery_app
      - beat
      - --loglevel=info
      - --schedule=/var/celerybeat/schedule
